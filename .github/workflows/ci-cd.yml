name: CareerPilot AI CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Node environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend Lint & Typecheck
        run: |
          pnpm --filter web lint
          pnpm --filter web type-check

      # Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-path: '3.12'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Python Code Quality (Ruff)
        run: poetry run ruff check apps/api

      - name: Python Static Type Checking (Mypy)
        run: poetry run mypy apps/api

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Security Tools
        run: pip install bandit safety

      - name: Python Security Audit (Bandit)
        run: bandit -r apps/api/ -ll

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install Frontend Dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend Vulnerability Scan (pnpm audit)
        run: pnpm audit --audit-level=high

  tests:
    needs: [lint-and-typecheck]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: careerpilot_user
          POSTGRES_PASSWORD: careerpilot_secure_pass_2026
          POSTGRES_DB: careerpilot_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Backend Dependencies
        run: poetry install

      - name: Run Backend Integration & API Tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: "postgresql+asyncpg://careerpilot_user:careerpilot_secure_pass_2026@localhost:5434/careerpilot_test"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "testsecretkeytestsecretkeytestsecretkey"
          OPENAI_API_KEY: "mock-key"
          GEMINI_API_KEY: "mock-key"
        run: poetry run pytest --cov=apps/api tests/

  build-and-deploy:
    needs: [tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js Production App
        run: pnpm --filter web build

      # Placeholder step showing the CD deployment strategy
      - name: Deploy to Cloud Provider
        run: |
          echo "Deploying production release artifacts..."
          # docker compose build && docker compose push
          # kubectl apply -k k8s/overlays/production
